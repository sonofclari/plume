version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  vllm-llm:
    image: vllm/vllm-openai:latest
    container_name: vllm-llm
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    # Qwen2.5-7B-Instruct: strong tool calling, fits in ~14 GB fp16 on the L4's 24 GB VRAM.
    # --gpu-memory-utilization 0.75 leaves ~4 GB headroom for the embedding container below.
    # --max-model-len 8192 is plenty for RAG and reduces KV-cache pre-allocation.
    # --enable-chunked-prefill + --enable-prefix-caching improve throughput for repeated system prompts.
    command: >
      --model Qwen/Qwen2.5-7B-Instruct
      --port 8000
      --dtype half
      --max-model-len 8192
      --gpu-memory-utilization 0.75
      --enable-chunked-prefill
      --enable-prefix-caching
      --max-num-seqs 32
      --enable-auto-tool-choice
      --tool-call-parser hermes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s
    restart: unless-stopped

  vllm-embed:
    image: vllm/vllm-openai:latest
    container_name: vllm-embed
    ports:
      - "8001:8001"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    # nomic-embed-text-v1.5: 768-dim encoder, ~300 MB weights.
    # --gpu-memory-utilization 0.18 reserves ~4.3 GB on the same L4 GPU (total with vllm-llm: ~22.3 GB).
    # --trust-remote-code is required for nomic's custom pooling.
    command: >
      --model nomic-ai/nomic-embed-text-v1.5
      --port 8001
      --trust-remote-code
      --dtype half
      --gpu-memory-utilization 0.18
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  app:
    build: .
    container_name: vapor-rag
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBEDDER_URL: http://vllm-embed:8001/v1
      EMBEDDER_MODEL: nomic-ai/nomic-embed-text-v1.5
      LLM_URL: http://vllm-llm:8000/v1
      LLM_MODEL: Qwen/Qwen2.5-7B-Instruct
      EMBEDDING_BATCH_SIZE: 50
    depends_on:
      qdrant:
        condition: service_started
      vllm-llm:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
